name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run all tests
        run: npm run test:ci
        env:
          CI: true

      - name: Run ESLint
        run: npm run lint
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Build check
        run: npm run build
        env:
          CI: true
          # Smoke-build placeholders only; production uses real vars (e.g. Vercel). Do not use secrets here.
          REACT_APP_FIREBASE_API_KEY: ci-placeholder-not-a-real-key
          REACT_APP_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID: ci-placeholder
          REACT_APP_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          REACT_APP_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
      
      - name: Coverage Report
        uses: ArtiomTr/jest-coverage-report-action@v2
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          test-script: npm run test:ci
          annotations: failed-tests
          package-manager: npm
