name: Cricket Live Scorecard

on:
  schedule:
    # Runs every 10 minutes. The API endpoint itself short-circuits with
    # ZERO external calls when no league's match window is open right now,
    # so the cricketdata.org daily quota (100 hits) is only consumed during
    # actual match play. With a 10-min cadence we use ~22 hits per single-
    # match day and ~48 hits per doubleheader day.
    - cron: '*/10 * * * *'

  # Allows manual triggering from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-scorecard:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Cricket Live Scorecard fetch
        run: |
          response=$(curl -s -w "\n%{http_code}" -L -X POST ${{ secrets.VERCEL_APP_URL }}/api/cricket-live-scorecard \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "❌ Scorecard fetch failed with status $http_code"
            exit 1
          else
            echo "✅ Scorecard fetch completed"
          fi
